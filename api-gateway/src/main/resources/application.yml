server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
      - "id=auth-service, uri=lb://auth-service, predicates=Path=/api/auth/**"
      - "id=account-service, uri=lb://account-service, predicates=Path=/api/accounts/**"
      - "id=transaction-service, uri=lb://transaction-service, predicates=Path=/api/transactions/**"
      - "id=card-service, uri=lb://card-service, predicates=Path=/api/cards/**"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"